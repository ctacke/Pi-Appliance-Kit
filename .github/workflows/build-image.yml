name: Build image

# Builds a fast-boot Raspberry Pi OS Lite (arm64) image and publishes it as a
# GitHub Release asset. The .img.xz lives on the Release — never in git.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # manual test builds

permissions:
  contents: write          # needed to create the Release + upload assets

jobs:
  build:
    # Native arm64 runner: pi-gen builds an arm64 rootfs and refuses to run under
    # QEMU emulation on amd64 ("Only a native build environment is supported"), so
    # we build on real arm64 hardware — no binfmt/QEMU setup needed.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bundle repo content into the custom stage so it is self-contained.
      - name: Bundle stage files
        run: |
          FILES=pi-gen/stage-appliance/00-appliance/files
          mkdir -p "$FILES"
          cp -a scripts config overlay "$FILES/"

      - name: Build image (pi-gen)
        id: build
        uses: usimd/pi-gen-action@v1
        with:
          image-name: pi-appliance-kit
          # Identity is baked at build time: cloud-init is purged and root is
          # read-only, so Raspberry Pi Imager's flash-time customisation does not
          # apply to this image. Every flashed device comes up headless-ready.
          hostname: pi-appliance
          username: pi
          # Password comes from a repo secret so it never lives in git.
          # Set it once:  gh secret set PI_PASSWORD
          password: ${{ secrets.PI_PASSWORD }}
          # REQUIRED for a headless appliance: disable Raspberry Pi OS's first-boot
          # user-setup wizard (export-image/01-user-rename) so the baked pi identity
          # is used as-is. Without this, trixie boots into "please enter a new username".
          disable-first-boot-user-rename: true
          # Lite = stages 0-2, then our custom stage.
          stage-list: stage0 stage1 stage2 ./pi-gen/stage-appliance
          # trixie is the release the pi-gen toolchain (default arm64 branch)
          # actively tracks; forcing bookworm here breaks apt signature checks.
          release: trixie
          # arm64 covers Pi 4, Pi 3B+, and Pi Zero 2 W.
          compression: xz
          compression-level: 9
          # No desktop, no locale prompts. SSH on (apply.sh then makes it
          # socket-activated so it stays off the boot critical path).
          enable-ssh: 1
          # Stream pi-gen's own stdout/stderr so build failures are visible in
          # the Actions log (otherwise pi-gen's error is swallowed into a file).
          verbose-output: true

      - name: Checksum
        run: |
          IMG="${{ steps.build.outputs.image-path }}"
          echo "IMG=$IMG" >> "$GITHUB_ENV"
          sha256sum "$IMG" > "$IMG.sha256"

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.IMG }}
            ${{ env.IMG }}.sha256
          body: |
            Fast-boot Raspberry Pi OS Lite (arm64) for Pi 4 / Pi 3B+ / Pi Zero 2 W.
            Flash the `.img.xz` with Raspberry Pi Imager. Verify with the `.sha256`.

      - name: Upload artifact (non-tag test builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: pi-appliance-kit-image
          path: |
            ${{ env.IMG }}
            ${{ env.IMG }}.sha256
